<html>
<body style="font-family: Arial, Helvetica, sans-serif; color: #333; font-size: 14px; line-height: 1.5;">
<table width="600" align="center" cellpadding="0" cellspacing="0" style="border: 1px solid #e0e0e0;">
  <tr>
    <td style="padding: 16px 20px; text-align: center; background: #ffffff; border-bottom: 1px solid #eee;">
      <img src="{shop_logo}" alt="{shop_name}" style="max-height: 60px;">
    </td>
  </tr>
  <tr>
    <td style="background: #2e7d32; color: #fff; padding: 14px 20px; font-size: 18px; font-weight: bold;">
      Rétractation validée — Procédure de retour
    </td>
  </tr>
  <tr>
    <td style="padding: 20px;">
      <p>Bonjour {firstname} {lastname},</p>
      <p>
        Votre demande de rétractation <strong>{request_ref}</strong> concernant la commande
        <strong>{order_ref}</strong> a été vérifiée et est <strong>conforme</strong>.
      </p>
      {procedure}
      <p>Cordialement,<br>{shop_name}</p>
    </td>
  </tr>
</table>
</body>
</html>
